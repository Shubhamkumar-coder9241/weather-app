<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
        integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <main>

        <div class="mainbox  mainbox1 w-[90%] max-w-sm min-h-[600px] rounded-2xl border-2 border-gray-800 bg-gradient-to-b from-[#252D58] via-[#533F9E] via-[#7D4FAA] to-[#953DA8] flex flex-col items-center justify-evenly p-5
            md:min-h-[550px]
            max-[480px]:w-[95%] max-[480px]:min-h-[500px] max-[480px]:p-4">

            <!-- Image -->
            <img src="few clouds.png" alt="Weather" class="w-[70%] max-w-[220px] h-auto
               md:w-[65%]
               max-[480px]:w-[60%]">

            <!-- Heading -->
            <div class="text-center flex flex-col items-center">

                <h1 class="text-white font-semibold text-[2.5rem]
                   md:text-[2rem]
                   max-[480px]:text-[1.8rem]">
                    WEATHER
                </h1>

                <h2 class="text-yellow-400 font-semibold text-[3rem]
                   md:text-[2.5rem]
                   max-[480px]:text-[2.2rem]">
                    FORECAST
                </h2>

            </div>

            <!-- Button -->
            <button id="startbtn" class="w-[180px] h-[50px] rounded-full bg-yellow-400 text-gray-900 font-medium text-lg transition-transform duration-300 hover:scale-105
               max-[480px]:w-[160px]
               max-[480px]:h-[45px]
               max-[480px]:text-base">
                GET START
            </button>

        </div>

 <!-- box 22222-->

        <div class="mainbox hide mainbox2 items-center justify-center  p-4">

            <div class="w-full max-w-sm bg-white/10 backdrop-blur-md rounded-3xl p-6 shadow-xl">

                <!-- Search -->
                <div class="flex items-center gap-3">
                    <input type="text" placeholder="Enter city name" id="input"
                        class="flex-1 h-12 px-4 rounded-full outline-none text-gray-700 placeholder-gray-400" />

                    <button
                        class="h-12 w-12 rounded-full  flex items-center justify-center hover:bg-yellow-500 transition">

                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M11 1.99964C11.2639 1.99964 11.525 2.01348 11.7832 2.03578C11.4424 2.63427 11.202 3.29716 11.084 4.0016C11.056 4.00127 11.028 3.99965 11 3.99965C7.13263 3.99965 4.00021 7.13233 4 10.9997C4 14.8672 7.1325 17.9997 11 17.9997C12.8956 17.9997 14.6148 17.2468 15.875 16.0241L16.0244 15.8747C17.247 14.6145 18 12.8951 18 10.9997C18 10.9714 17.9974 10.9429 17.9971 10.9147C18.7018 10.7968 19.3642 10.5563 19.9629 10.2155C19.9852 10.4739 20 10.7355 20 10.9997C20 13.1235 19.2632 15.077 18.0312 16.6169L22.3135 20.8991L20.8994 22.3132L16.6172 18.0309C15.0773 19.263 13.124 19.9997 11 19.9997C6.032 19.9997 2 15.9677 2 10.9997C2.00021 6.03182 6.03213 1.99964 11 1.99964ZM16.5293 1.31898C16.7059 0.893192 17.2942 0.89318 17.4707 1.31898L17.7236 1.93031C18.1556 2.9731 18.9616 3.80582 19.9746 4.25648L20.6924 4.57582C21.1026 4.75864 21.1026 5.35584 20.6924 5.53871L19.9326 5.8766C18.9449 6.31588 18.1534 7.11911 17.7139 8.12758L17.4668 8.69302C17.2864 9.10715 16.7137 9.10715 16.5332 8.69302L16.2871 8.12758C15.8476 7.11895 15.0552 6.31593 14.0674 5.8766L13.3076 5.53871C12.8974 5.35585 12.8974 4.75863 13.3076 4.57582L14.0254 4.25648C15.0385 3.80582 15.8445 2.97312 16.2764 1.93031L16.5293 1.31898Z">
                            </path>
                        </svg>

                    </button>
                </div>

                <!-- Weather Image -->
                <div class="flex justify-center mt-8">
                    <img src="few clouds.png" alt="Weather" class="w-40 sm:w-48 md:w-56">
                </div>

                <!-- Description -->
                <h2 class="text-center text-white text-2xl font-semibold mt-4">
                    Cloudy
                </h2>

                <!-- Temperature -->
                <div class="text-center mt-5">
                    <h1 class="text-6xl font-bold text-white">
                        <span id="degree">28</span>°C
                    </h1>

                    <p class="text-xl text-yellow-300 font-medium">
                        Delhi
                    </p>
                </div>

                <!-- Weather Information -->
                <div class="grid grid-cols-2 gap-6 mt-8">

                    <!-- Wind -->
                    <div class="flex items-center gap-3">
                        <img src="wind.png" class="w-10 h-10" alt="Wind">

                        <div>
                            <p class="text-gray-200 text-sm">Wind</p>
                            <p class="text-white font-semibold">2.57 km/h</p>
                        </div>
                    </div>

                    <!-- Humidity -->
                    <div class="flex items-center gap-3">
                        <img src="humidity.png" class="w-10 h-10" alt="Humidity">

                        <div>
                            <p class="text-gray-200 text-sm">Humidity</p>
                            <p class="text-white font-semibold">65%</p>
                        </div>
                    </div>

                </div>

            </div>

        </div>

 <!-- box 33333-->

       <div class="mainbox hide flex flex-col items-center justify-center text-center px-6 py-8">

    <!-- Error Image -->


    <!-- Error Code -->
    <h1 class="text-6xl sm:text-7xl font-extrabold text-white">
        404
    </h1>

    <!-- Title -->
    <h2 class="mt-3 text-2xl sm:text-3xl font-semibold text-yellow-400">
        City Not Found
    </h2>

    <!-- Description -->
    <p class="mt-4 text-gray-200 text-sm sm:text-base max-w-xs">
        We couldn't find the city you're looking for.
        Please check the spelling and try again.
    </p>

    <!-- Button -->
    <button
        class="mt-8 px-8 py-3 bg-yellow-400 text-gray-900 font-semibold rounded-full hover:bg-yellow-300 hover:scale-105 transition duration-300">
        Try Again
    </button>

</div>

    </main>

    <script src="script.js"></script>
</body>

</html>
